services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexuscore
    ports:
      - "8081:8080"
      - "5001:5000"
    environment:
      - REDIS_URL=redis://shared-redis:6379
      - PYTHONUNBUFFERED=1
    networks:
      - shared-infrastructure_default
    restart: unless-stopped
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs

networks:
  shared-infrastructure_default:
    external: true
